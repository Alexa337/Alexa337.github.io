  <img 
    src="images/yinsi1.png" alt="作品图片"

<p style="font-size:20px; color:#d4af37; font-family: KaiTi, STKaiti,'Songti SC', serif;text-align:center">
  我如旧时王谢堂前之燕，从帝王掌心飞入寻常百姓指尖，
  以一根银丝的柔韧，续写着千年不绝的文明脉络。
</p>
